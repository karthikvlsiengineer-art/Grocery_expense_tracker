<!DOCTYPE html>
<html>

<head>

<title>Grocery Expense Tracker</title>

<link rel="icon" type="image/png" href="logo.png">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Grocery Expense Tracker</h1>


<form id="expenseForm">

<input type="text" id="item" placeholder="Item" required>

<input type="number" id="amount" placeholder="Amount" required>

<input type="date" id="date" required>

<button type="submit">Add Expense</button>

</form>


<h2>Total Expense: ₹<span id="totalExpense">0</span></h2>


<h2>Expense List</h2>

<table>

<tr>
<th>Item</th>
<th>Amount</th>
<th>Date</th>
<th>Delete</th>
</tr>

<tbody id="expenseTable"></tbody>

</table>


<h2>Expense Charts</h2>


<div class="charts">

<div class="chart">
<h3>Item Expense Distribution</h3>
<canvas id="pieChart"></canvas>
</div>


<div class="chart">
<h3>Monthly Expense</h3>
<canvas id="barChart"></canvas>
</div>

</div>


<script>

const API = "https://grocery-expense-tracker.onrender.com";

function loadExpenses(){

fetch(API + "/expenses")
.then(res => res.json())
.then(data => {

let table = document.getElementById("expenseTable");
table.innerHTML = "";

let total = 0;

data.forEach(e => {

total += e.amount;

table.innerHTML += `
<tr>
<td>${e.item}</td>
<td>₹${e.amount}</td>
<td>${e.date}</td>
<td>
<button onclick="deleteExpense(${e.id})">Delete</button>
</td>
</tr>
`;

});

document.getElementById("totalExpense").innerText = total;

});

}


function deleteExpense(id){

fetch(API + "/delete/" + id,{
method:"DELETE"
})
.then(()=>loadExpenses());

}


document.getElementById("expenseForm").addEventListener("submit",function(e){

e.preventDefault();

let item = document.getElementById("item").value;
let amount = document.getElementById("amount").value;
let date = document.getElementById("date").value;

fetch(API + "/add-expense",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
item:item,
amount:amount,
date:date
})
})
.then(()=>{

document.getElementById("expenseForm").reset();
loadExpenses();
loadCharts();

});

});


function loadCharts(){

fetch(API + "/chart-data")
.then(res => res.json())
.then(data => {


new Chart(
document.getElementById("pieChart"),
{
type:'pie',
data:{
labels:data.item_labels,
datasets:[{
data:data.item_values
}]
}
});


new Chart(
document.getElementById("barChart"),
{
type:'bar',
data:{
labels:data.month_labels,
datasets:[{
label:'Monthly Expense',
data:data.month_values
}]
}
});

});

}


loadExpenses();
loadCharts();

</script>


</body>
</html>
