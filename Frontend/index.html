<!DOCTYPE html>
<html>

<head>

<title>Grocery Expense Tracker</title>

<!-- Browser tab logo -->
<link rel="icon" type="image/png" href="./logo.png">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- App title with logo -->
<h1 style="display:flex;align-items:center;gap:10px;">
<img src="./logo.png" width="40" height="40">
Grocery Expense Tracker
</h1>

<form id="expenseForm">

<input type="text" id="item" placeholder="Item" required>

<input type="number" id="amount" placeholder="Amount" required>

<input type="date" id="date" required>

<button type="submit">Add Expense</button>

</form>

<h2>Total Expense: ₹<span id="totalExpense">0</span></h2>

<h2>Expense List</h2>

<table>

<tr>
<th>Item</th>
<th>Amount</th>
<th>Date</th>
<th>Delete</th>
</tr>

<tbody id="expenseTable"></tbody>

</table>

<h2>Expense Charts</h2>

<div class="charts">

<div class="chart">
<h3>Item Expense Distribution</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="chart">
<h3>Monthly Expense</h3>
<canvas id="barChart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
